<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifat Video Platform</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;}
header{background:#1e293b;padding:15px;text-align:center;}
#search{width:80%;padding:10px;border-radius:6px;border:none;}
.container{display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:15px;}
.video-box{background:#1e293b;padding:10px;border-radius:10px;}
video{width:100%;border-radius:8px;}
.desc{margin-top:5px;font-size:14px;}

.loginPage{display:flex;justify-content:center;align-items:center;height:100vh;}
.login-box{background:#1e293b;padding:30px;border-radius:10px;text-align:center;}
.login-box input{display:block;margin:10px;padding:10px;width:200px;}

.hidden{display:none;}
</style>
</head>

<body>

<!-- Login Page -->
<div id="loginPage" class="loginPage">
<div class="login-box">
<h2>🔐 Login</h2>
<input type="email" id="email" placeholder="Enter Gmail">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="error" style="color:red;"></p>
</div>
</div>

<!-- Video Site -->
<div id="site" class="hidden">

<header>
<h2>🎬 Rifat Video Site</h2>
<input type="text" id="search" placeholder="Search video..." onkeyup="searchVideo()">
</header>

<div class="container">

<div class="video-box" data-title="nature">
<video controls onclick="checkVideoPassword(event)">
<source src="video1.mp4">
</video>
<div class="desc"><b>Nature Video</b><br>Beautiful nature scenery</div>
</div>

<div class="video-box" data-title="travel">
<video controls onclick="checkVideoPassword(event)">
<source src="video2.mp4">
</video>
<div class="desc"><b>Travel Video</b><br>Amazing travel moments</div>
</div>

<div class="video-box" data-title="animals">
<video controls onclick="checkVideoPassword(event)">
<source src="video3.mp4">
</video>
<div class="desc"><b>Animal Video</b><br>Cute animals compilation</div>
</div>

<div class="video-box" data-title="sports">
<video controls onclick="checkVideoPassword(event)">
<source src="video4.mp4">
</video>
<div class="desc"><b>Sports Video</b><br>Best sports highlights</div>
</div>

</div>
</div>

<script>

// Login credentials
const correctEmail="[`]";
const correctPass="[`]";

// Video password
const videoPassword="1234";

function login(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

if(email===correctEmail && pass===correctPass){

document.getElementById("loginPage").style.display="none";
document.getElementById("site").classList.remove("hidden");

}else{

document.getElementById("error").innerText="Wrong Email or Password";

}

}

// Search
function searchVideo(){

let input=document.getElementById("search").value.toLowerCase();

document.querySelectorAll(".video-box").forEach(video=>{

let title=video.getAttribute("data-title");

video.style.display=title.includes(input)?"block":"none";

});

}

// Video password check
function checkVideoPassword(e){

let pass=prompt("Enter video password");

if(pass!==videoPassword){

alert("Wrong password!");
e.preventDefault();

}

}

</script>

</body>
</html>
